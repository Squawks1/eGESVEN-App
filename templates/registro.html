{% extends 'base.html' %}

{% block contenido %}

<h2>Registro de Usuario</h2>

<form>

    <div class="mb-3">

        <label>Nombre</label>

        <input class="form-control">

    </div>

    <div class="mb-3">

        <label>Correo</label>

        <input
        type="email"
        class="form-control">

    </div>

    <div class="mb-3">

        <label>Contraseña</label>

        <input
        type="password"
        class="form-control">

    </div>

        <a href="{% url 'login' %}" class="btn btn-success">
        Registrarse
        </a>

</form>

{% endblock %}
